<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Pixel Shot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0b1020;
            --panel: rgba(255, 255, 255, 0.06);
            --panel-border: rgba(148, 163, 184, 0.3);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #f59e0b;
            --accent-2: #22d3ee;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 18%, rgba(34, 211, 238, 0.16), transparent 32%),
                radial-gradient(circle at 84% 84%, rgba(245, 158, 11, 0.2), transparent 30%),
                linear-gradient(180deg, #030712, #0b1020 55%, #111827);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(100%, 560px);
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 22px;
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
        }

        .intro {
            padding: 28px;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--accent-2);
        }

        h1 {
            margin: 10px 0 8px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.05;
        }

        .intro p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .steps {
            margin-top: 18px;
            display: grid;
            gap: 10px;
        }

        .step {
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.04);
        }

        .step strong {
            display: block;
            margin-bottom: 4px;
        }

        .step span {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .auth {
            padding: 22px;
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .tab {
            border: 1px solid var(--panel-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            border-radius: 999px;
            padding: 11px 12px;
            font-weight: 800;
            cursor: pointer;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--accent), #fb7185);
            color: #111827;
            border-color: transparent;
        }

        form {
            display: none;
            gap: 11px;
        }

        form.active {
            display: grid;
        }

        label {
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 700;
        }

        input {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            background: rgba(15, 23, 42, 0.65);
            color: var(--text);
            padding: 12px 13px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-2);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.18);
        }

        .btn {
            margin-top: 4px;
            border: none;
            border-radius: 12px;
            padding: 12px 13px;
            font-weight: 800;
            cursor: pointer;
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--accent), #fb7185);
            color: #111827;
        }

        .btn.ghost {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid var(--panel-border);
            text-decoration: none;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .hint {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.88rem;
            line-height: 1.6;
        }

        .notice {
            margin-top: 12px;
            border-radius: 12px;
            padding: 11px 12px;
            font-weight: 700;
            display: none;
        }

        .notice.show {
            display: block;
        }

        .notice.error {
            background: rgba(239, 68, 68, 0.16);
            color: #fecaca;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .notice.success {
            background: rgba(34, 197, 94, 0.16);
            color: #bbf7d0;
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        @media (max-width: 900px) {
            .shell {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <main class="shell">
        <section class="panel auth">
            <div class="tabs">
                <button id="tab-login" class="tab active" type="button">Admin Login</button>
                <button id="tab-register" class="tab" type="button">Admin Register</button>
            </div>

            <form id="login-form" class="active">
                <div>
                    <label for="login-email">Email</label>
                    <input id="login-email" type="email" required placeholder="admin@example.com">
                </div>
                <div>
                    <label for="login-password">Password</label>
                    <input id="login-password" type="password" required placeholder="Enter password">
                </div>
                <button class="btn primary" type="submit">Login as Admin</button>
                <a class="btn ghost" href="index.html">Continue as User</a>
                <p class="hint">Only accounts with role <strong>admin</strong> can access dashboard.</p>
            </form>

            <form id="register-form">
                <div>
                    <label for="register-name">Full Name</label>
                    <input id="register-name" type="text" required placeholder="Admin Name">
                </div>
                <div>
                    <label for="register-email">Email</label>
                    <input id="register-email" type="email" required placeholder="admin@example.com">
                </div>
                <div>
                    <label for="register-password">Password</label>
                    <input id="register-password" type="password" required placeholder="Create password">
                </div>
                <div>
                    <label for="register-confirm">Confirm Password</label>
                    <input id="register-confirm" type="password" required placeholder="Confirm password">
                </div>
                <button class="btn primary" type="submit">Register Admin</button>
                <a class="btn ghost" href="index.html">Continue as User</a>
            </form>

            <div id="notice" class="notice" role="status" aria-live="polite"></div>
        </section>
    </main>

    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const notice = document.getElementById('notice');

        const getApiBaseUrl = () => {
            const renderBackendUrl = 'https://camera-3-weni.onrender.com';
            const hostname = window.location.hostname;
            const isLocal = hostname === 'localhost' || hostname === '127.0.0.1';

            if (isLocal) {
                return 'http://localhost:3000';
            }

            return renderBackendUrl;
        };

        const API_BASE_URL = getApiBaseUrl();

        function showNotice(message, type) {
            notice.textContent = message;
            notice.className = `notice ${type} show`;
        }

        function openTab(tab) {
            const isLogin = tab === 'login';
            tabLogin.classList.toggle('active', isLogin);
            tabRegister.classList.toggle('active', !isLogin);
            loginForm.classList.toggle('active', isLogin);
            registerForm.classList.toggle('active', !isLogin);
            notice.className = 'notice';
            notice.textContent = '';
        }

        tabLogin.addEventListener('click', () => openTab('login'));
        tabRegister.addEventListener('click', () => openTab('register'));

        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;

            if (!name || !email || !password || !confirm) {
                showNotice('Please fill all required fields.', 'error');
                return;
            }

            if (password !== confirm) {
                showNotice('Password and confirm password must match.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        role: 'admin'
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Admin registration failed.');
                }

                showNotice('Admin registration successful. Please login now.', 'success');
                document.getElementById('login-email').value = email;
                openTab('login');
            } catch (error) {
                showNotice(error.message || 'Unable to register admin account.', 'error');
            }
        });

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showNotice('Please enter login credentials.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Admin login failed.');
                }

                const role = String(data?.user?.role || '').toLowerCase();
                if (role !== 'admin') {
                    throw new Error('This account is not admin. Please register/login with admin account.');
                }

                const authUser = {
                    ...data.user,
                    token: data.token
                };

                localStorage.setItem('cameraStoreUser', JSON.stringify(authUser));
                localStorage.setItem('cameraStoreToken', data.token);
                localStorage.setItem('token', data.token);
                localStorage.setItem('cameraStoreRolePreference', 'admin');

                showNotice('Admin login successful. Redirecting to dashboard...', 'success');
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 700);
            } catch (error) {
                showNotice(error.message || 'Unable to login as admin.', 'error');
            }
        });
    </script>
</body>

</html>
