name: Docker CI and Render Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build the full Docker Compose stack and smoke-test the app before publishing.
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start the stack with Docker Compose
        env:
          # Use a non-default host port for MySQL to avoid collisions on the runner.
          MYSQL_HOST_PORT: 3307
        run: |
          docker compose up -d --build

      - name: Wait for app health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health; then
              echo "App is healthy."
              exit 0
            fi
            echo "Waiting for app to become healthy..."
            sleep 5
          done
          echo "App did not become healthy in time."
          docker compose logs --no-color app db
          exit 1

      - name: Show compose status
        if: always()
        run: docker compose ps

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # Trigger a Render deployment after the Docker smoke test passes.
  deploy-render:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          # Add these as GitHub repository secrets.
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Missing Render secrets: RENDER_API_KEY and RENDER_SERVICE_ID are required."
            exit 1
          fi

          curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'
